<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boston Public Schools — MCAS Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; color: #2d3436; }
.header { background: #1a1a2e; color: white; padding: 16px 24px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .subtitle { font-size: 13px; color: #a0a0b8; margin-top: 4px; }
.controls { display: flex; gap: 12px; align-items: center; padding: 12px 24px; background: white; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
.controls label { font-size: 13px; font-weight: 500; color: #636e72; }
.controls select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
.controls .filter-group { display: flex; gap: 4px; align-items: center; }
.controls .band-btn { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; cursor: pointer; background: white; }
.controls .band-btn.active { background: #0984e3; color: white; border-color: #0984e3; }
.main { display: flex; gap: 0; padding: 0; height: calc(100vh - 120px); }
.panel { background: white; overflow: hidden; }
.panel-left { flex: 0 0 55%; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
.panel-right { flex: 0 0 45%; display: flex; flex-direction: column; }
.panel-header { padding: 10px 16px; font-size: 14px; font-weight: 600; border-bottom: 1px solid #eee; background: #fafbfc; display: flex; justify-content: space-between; align-items: center; }
.panel-header select { font-size: 12px; }
.chart-container { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
.bar-row { display: flex; align-items: center; padding: 2px 12px; cursor: pointer; border-bottom: 1px solid #f5f5f5; height: 22px; }
.bar-row:hover { background: #f0f7ff; }
.bar-row.selected { background: #dbeafe; }
.bar-row .school-name { flex: 0 0 200px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-row .bar-area { flex: 1; height: 14px; position: relative; }
.bar-row .bar { height: 100%; border-radius: 2px; position: absolute; left: 0; top: 0; }
.bar-row .bar-value { position: absolute; right: 4px; top: 0; font-size: 10px; line-height: 14px; color: #666; }
.scatter-wrap { flex: 1; padding: 16px; display: flex; justify-content: center; align-items: center; }
.scatter-wrap svg { width: 100%; height: 100%; }
.tooltip { position: fixed; background: #2d3436; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 1000; display: none; max-width: 300px; line-height: 1.5; }
.tooltip .tt-name { font-weight: 600; font-size: 13px; }
.tooltip .tt-row { color: #dfe6e9; }
.legend { display: flex; gap: 16px; padding: 8px 16px; font-size: 12px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.info-bar { background: white; border-top: 1px solid #e0e0e0; padding: 10px 24px; font-size: 13px; display: flex; gap: 24px; flex-wrap: wrap; min-height: 44px; align-items: center; }
.info-bar .info-label { color: #636e72; }
.info-bar .info-value { font-weight: 600; }
.sumner-marker .school-name { font-weight: 700 !important; color: #d63031 !important; }
</style>
</head>
<body>
<div class="header">
  <h1>Boston Public Schools — MCAS Performance Dashboard</h1>
  <div class="subtitle">Data from MA DESE MCAS Achievement Results, 2017–2025</div>
</div>
<div class="controls">
  <div class="filter-group">
    <label>Year:</label>
    <select id="yearSelect"></select>
  </div>
  <div class="filter-group">
    <label>Metric:</label>
    <select id="metricSelect">
      <option value="composite">Composite (ELA+Math)</option>
      <option value="ela_score">ELA Score</option>
      <option value="math_score">Math Score</option>
      <option value="ela_me_pct">ELA % Proficient</option>
      <option value="math_me_pct">Math % Proficient</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Grade Band:</label>
    <button class="band-btn active" data-band="All">All</button>
    <button class="band-btn" data-band="Elementary">Elem</button>
    <button class="band-btn" data-band="K-8">K-8</button>
    <button class="band-btn" data-band="Middle">Middle</button>
    <button class="band-btn" data-band="High">High</button>
  </div>
  <div class="filter-group">
    <label>Scatter Y:</label>
    <select id="scatterY">
      <option value="ela_sgp">ELA SGP</option>
      <option value="math_sgp">Math SGP</option>
      <option value="ela_score">ELA Score</option>
      <option value="math_score">Math Score</option>
      <option value="composite">Composite Score</option>
      <option value="ela_me_pct">ELA % Proficient</option>
      <option value="math_me_pct">Math % Proficient</option>
      <option value="ela_percentile">ELA Percentile</option>
      <option value="math_percentile">Math Percentile</option>
      <option value="pct_low_income">% Low Income</option>
      <option value="pct_high_needs">% High Needs</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Scatter X:</label>
    <select id="scatterX">
      <option value="math_sgp">Math SGP</option>
      <option value="ela_sgp">ELA SGP</option>
      <option value="math_score">Math Score</option>
      <option value="ela_score">ELA Score</option>
      <option value="composite">Composite Score</option>
      <option value="math_me_pct">Math % Proficient</option>
      <option value="ela_me_pct">ELA % Proficient</option>
      <option value="math_percentile">Math Percentile</option>
      <option value="ela_percentile">ELA Percentile</option>
      <option value="pct_low_income">% Low Income</option>
      <option value="pct_high_needs">% High Needs</option>
    </select>
  </div>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00b894"></div>Elementary</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0984e3"></div>K-8</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6c5ce7"></div>Middle</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e17055"></div>High</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fdcb6e"></div>6-12</div>
</div>
<div class="main">
  <div class="panel panel-left">
    <div class="panel-header">
      <span id="barTitle">Schools — Composite Score</span>
      <span id="barCount" style="font-size:12px;color:#636e72"></span>
    </div>
    <div class="chart-container" id="barChart"></div>
  </div>
  <div class="panel panel-right">
    <div class="panel-header">
      <span id="scatterTitle">Math SGP vs ELA SGP</span>
    </div>
    <div class="scatter-wrap" id="scatterWrap">
      <svg id="scatterSvg" viewBox="0 0 500 450"></svg>
    </div>
  </div>
</div>
<div class="info-bar" id="infoBar">
  <span style="color:#999">Click a school to see details</span>
</div>
<div class="tooltip" id="tooltip"></div>

const BAND_COLORS = {
  'Elementary': '#00b894',
  'K-8': '#0984e3',
  'Middle': '#6c5ce7',
  'High': '#e17055',
  '6-12': '#fdcb6e'
};

const METRIC_LABELS = {
  'composite': 'Composite Score',
  'ela_score': 'ELA Score',
  'math_score': 'Math Score',
  'ela_sgp': 'ELA SGP',
  'math_sgp': 'Math SGP',
  'ela_me_pct': 'ELA % Proficient',
  'math_me_pct': 'Math % Proficient',
  'pct_low_income': '% Low Income',
  'pct_high_needs': '% High Needs',
  'ela_percentile': 'ELA Percentile',
  'math_percentile': 'Math Percentile'
};

const MARKER_SCHOOLS = [];

let selectedSchool = null;
let currentBand = 'All';

// Populate year dropdown
const yearSel = document.getElementById('yearSelect');
DATA.years.slice().reverse().forEach(y => {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y === 'avg' ? 'All-Time Avg' : y;
  yearSel.appendChild(opt);
});

// Band buttons
document.querySelectorAll('.band-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBand = btn.dataset.band;
    render();
  });
});

// Dropdowns
yearSel.addEventListener('change', render);
document.getElementById('metricSelect').addEventListener('change', render);
document.getElementById('scatterX').addEventListener('change', render);
document.getElementById('scatterY').addEventListener('change', render);

function getSchoolsForYear(year) {
  const schools = [];
  for (const [code, info] of Object.entries(DATA.schools)) {
    const yd = info.years[String(year)];
    if (!yd) continue;
    schools.push({ code, name: info.name, ...yd });
  }
  return schools;
}

function filterByBand(schools) {
  if (currentBand === 'All') return schools;
  return schools.filter(s => s.grade_band === currentBand);
}

function render() {
  const year = yearSel.value === 'avg' ? 'avg' : parseInt(yearSel.value);
  const metric = document.getElementById('metricSelect').value;
  const sx = document.getElementById('scatterX').value;
  const sy = document.getElementById('scatterY').value;

  let schools = getSchoolsForYear(year);
  schools = filterByBand(schools);

  renderBars(schools, metric);
  renderScatter(schools, sx, sy);
  updateInfo();
  updateTitles(metric, sx, sy);
}

function updateTitles(metric, sx, sy) {
  document.getElementById('barTitle').textContent = 'Schools — ' + (METRIC_LABELS[metric] || metric);
  document.getElementById('scatterTitle').textContent = (METRIC_LABELS[sy] || sy) + ' vs ' + (METRIC_LABELS[sx] || sx);
}

function renderBars(schools, metric) {
  const container = document.getElementById('barChart');
  container.innerHTML = '';

  // Sort alphabetically by school name
  const sorted = schools
    .filter(s => s[metric] != null)
    .sort((a, b) => a.name.localeCompare(b.name));

  document.getElementById('barCount').textContent = sorted.length + ' schools';

  if (sorted.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:#999">No data for this selection</div>';
    return;
  }

  const isPct = metric.includes('me_pct');
  const maxVal = Math.max(...sorted.map(s => s[metric]));
  const minVal = Math.min(...sorted.map(s => s[metric]));
  const range = maxVal - minVal || 1;

  sorted.forEach(s => {
    const row = document.createElement('div');
    row.className = 'bar-row' + (selectedSchool === s.code ? ' selected' : '') +
      (MARKER_SCHOOLS.includes(s.name) ? ' sumner-marker' : '');
    row.dataset.code = s.code;

    const pct = ((s[metric] - minVal) / range) * 100;
    const displayVal = isPct ? (s[metric] * 100).toFixed(0) + '%' : s[metric].toFixed(0);
    const color = BAND_COLORS[s.grade_band] || '#b2bec3';

    row.innerHTML = `
      <div class="school-name" title="${s.name}">${s.name}</div>
      <div class="bar-area">
        <div class="bar" style="width:${Math.max(pct, 2)}%;background:${color}"></div>
        <div class="bar-value">${displayVal}</div>
      </div>`;

    row.addEventListener('click', () => {
      selectedSchool = selectedSchool === s.code ? null : s.code;
      render();
    });

    row.addEventListener('mouseenter', (e) => showTooltip(e, s));
    row.addEventListener('mouseleave', hideTooltip);

    container.appendChild(row);
  });

  // Scroll selected into view
  if (selectedSchool) {
    const sel = container.querySelector('.selected');
    if (sel) sel.scrollIntoView({ block: 'nearest' });
  }
}

function renderScatter(schools, xKey, yKey) {
  const svg = document.getElementById('scatterSvg');
  svg.innerHTML = '';

  const valid = schools.filter(s => s[xKey] != null && s[yKey] != null);
  if (valid.length === 0) return;

  const pad = { top: 20, right: 20, bottom: 45, left: 50 };
  const w = 500, h = 450;
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  const xVals = valid.map(s => s[xKey]);
  const yVals = valid.map(s => s[yKey]);
  let xMin = Math.min(...xVals), xMax = Math.max(...xVals);
  let yMin = Math.min(...yVals), yMax = Math.max(...yVals);

  // Add padding
  const xPad = (xMax - xMin) * 0.05 || 1;
  const yPad = (yMax - yMin) * 0.05 || 1;
  xMin -= xPad; xMax += xPad;
  yMin -= yPad; yMax += yPad;

  function sx(v) { return pad.left + (v - xMin) / (xMax - xMin) * pw; }
  function sy(v) { return pad.top + ph - (v - yMin) / (yMax - yMin) * ph; }

  // Grid lines
  const xTicks = niceScale(xMin, xMax, 6);
  const yTicks = niceScale(yMin, yMax, 6);

  xTicks.forEach(t => {
    if (t < xMin || t > xMax) return;
    const x = sx(t);
    svg.innerHTML += `<line x1="${x}" y1="${pad.top}" x2="${x}" y2="${pad.top+ph}" stroke="#eee" stroke-width="1"/>`;
    const isPctX = xKey.includes('pct') || xKey.includes('me_pct');
    const label = isPctX ? (t*100).toFixed(0)+'%' : t.toFixed(0);
    svg.innerHTML += `<text x="${x}" y="${h-5}" text-anchor="middle" font-size="10" fill="#999">${label}</text>`;
  });

  yTicks.forEach(t => {
    if (t < yMin || t > yMax) return;
    const y = sy(t);
    svg.innerHTML += `<line x1="${pad.left}" y1="${y}" x2="${pad.left+pw}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    const isPctY = yKey.includes('pct') || yKey.includes('me_pct');
    const label = isPctY ? (t*100).toFixed(0)+'%' : t.toFixed(0);
    svg.innerHTML += `<text x="${pad.left-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#999">${label}</text>`;
  });

  // Axis labels
  svg.innerHTML += `<text x="${pad.left + pw/2}" y="${h-22}" text-anchor="middle" font-size="12" fill="#636e72">${METRIC_LABELS[xKey] || xKey}</text>`;
  svg.innerHTML += `<text x="14" y="${pad.top + ph/2}" text-anchor="middle" font-size="12" fill="#636e72" transform="rotate(-90,14,${pad.top+ph/2})">${METRIC_LABELS[yKey] || yKey}</text>`;

  // Points - render non-selected first, selected on top
  const sortedValid = [...valid].sort((a, b) => {
    if (a.code === selectedSchool) return 1;
    if (b.code === selectedSchool) return -1;
    return 0;
  });

  sortedValid.forEach(s => {
    const cx = sx(s[xKey]);
    const cy = sy(s[yKey]);
    const color = BAND_COLORS[s.grade_band] || '#b2bec3';
    const isSelected = s.code === selectedSchool;
    const isMarker = MARKER_SCHOOLS.includes(s.name);
    const r = isSelected ? 7 : (isMarker ? 6 : 4.5);
    const opacity = selectedSchool && !isSelected ? 0.25 : 0.8;
    const stroke = isSelected ? '#2d3436' : (isMarker ? '#d63031' : 'white');
    const sw = isSelected ? 2.5 : (isMarker ? 2 : 1);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', color);
    circle.setAttribute('fill-opacity', opacity);
    circle.setAttribute('stroke', stroke);
    circle.setAttribute('stroke-width', sw);
    circle.style.cursor = 'pointer';
    circle.style.transition = 'r 0.15s, fill-opacity 0.15s';

    circle.addEventListener('click', () => {
      selectedSchool = selectedSchool === s.code ? null : s.code;
      render();
    });
    circle.addEventListener('mouseenter', (e) => showTooltip(e, s));
    circle.addEventListener('mouseleave', hideTooltip);

    svg.appendChild(circle);

    // Label for selected or marker
    if (isSelected || isMarker) {
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', cx + r + 3);
      label.setAttribute('y', cy - r);
      label.setAttribute('font-size', '10');
      label.setAttribute('fill', isMarker ? '#d63031' : '#2d3436');
      label.setAttribute('font-weight', '600');
      label.textContent = s.name.length > 25 ? s.name.substring(0, 24) + '…' : s.name;
      svg.appendChild(label);
    }
  });
}

function niceScale(min, max, targetTicks) {
  const range = max - min;
  const rough = range / targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const residual = rough / mag;
  let nice;
  if (residual <= 1.5) nice = 1;
  else if (residual <= 3) nice = 2;
  else if (residual <= 7) nice = 5;
  else nice = 10;
  const step = nice * mag;
  const ticks = [];
  let t = Math.ceil(min / step) * step;
  while (t <= max) {
    ticks.push(Math.round(t * 1000) / 1000);
    t += step;
  }
  return ticks;
}

function showTooltip(e, s) {
  const tt = document.getElementById('tooltip');
  const isPctMetric = (k) => k && (k.includes('me_pct'));
  const fmtVal = (v, k) => {
    if (v == null) return '—';
    if (k && k.includes('me_pct')) return (v * 100).toFixed(0) + '%';
    if (k && k.includes('pct_')) return v.toFixed(0) + '%';
    return v.toFixed(0);
  };

  tt.innerHTML = `
    <div class="tt-name">${s.name}</div>
    <div class="tt-row">${s.grade_band} · N=${s.ela_n || s.math_n || '?'}</div>
    <div class="tt-row">ELA: ${s.ela_score || '—'} · Math: ${s.math_score || '—'} · Composite: ${s.composite || '—'}</div>
    <div class="tt-row">ELA SGP: ${s.ela_sgp || '—'} · Math SGP: ${s.math_sgp || '—'}</div>
    <div class="tt-row">ELA Prof: ${fmtVal(s.ela_me_pct, 'me_pct')} · Math Prof: ${fmtVal(s.math_me_pct, 'me_pct')}</div>
    ${s.pct_low_income != null ? '<div class="tt-row">Low Income: ' + s.pct_low_income.toFixed(0) + '%</div>' : ''}
  `;
  tt.style.display = 'block';
  const x = Math.min(e.clientX + 12, window.innerWidth - 320);
  const y = Math.min(e.clientY - 10, window.innerHeight - 120);
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function updateInfo() {
  const bar = document.getElementById('infoBar');
  if (!selectedSchool) {
    bar.innerHTML = '<span style="color:#999">Click a school to see details</span>';
    return;
  }
  const info = DATA.schools[selectedSchool];
  if (!info) return;
  const year = yearSel.value;
  const d = info.years[year];
  if (!d) {
    bar.innerHTML = `<span class="info-value">${info.name}</span> <span class="info-label">— no data for ${year}</span>`;
    return;
  }
  const fmtPct = v => v != null ? (v * 100).toFixed(0) + '%' : '—';
  bar.innerHTML = `
    <span><span class="info-value">${info.name}</span> <span class="info-label">(${d.grade_band})</span></span>
    <span><span class="info-label">ELA:</span> <span class="info-value">${d.ela_score || '—'}</span></span>
    <span><span class="info-label">Math:</span> <span class="info-value">${d.math_score || '—'}</span></span>
    <span><span class="info-label">Composite:</span> <span class="info-value">${d.composite || '—'}</span></span>
    <span><span class="info-label">ELA SGP:</span> <span class="info-value">${d.ela_sgp || '—'}</span></span>
    <span><span class="info-label">Math SGP:</span> <span class="info-value">${d.math_sgp || '—'}</span></span>
    <span><span class="info-label">ELA Prof:</span> <span class="info-value">${fmtPct(d.ela_me_pct)}</span></span>
    <span><span class="info-label">Math Prof:</span> <span class="info-value">${fmtPct(d.math_me_pct)}</span></span>
    ${d.pct_low_income != null ? '<span><span class="info-label">Low Inc:</span> <span class="info-value">' + d.pct_low_income.toFixed(0) + '%</span></span>' : ''}
    <span><span class="info-label">N:</span> <span class="info-value">${d.ela_n || d.math_n || '—'}</span></span>
  `;
}

// Initial render
render();
</script>
